        depends_on:
            postgres-auth:
                condition: service_healthy
            postgres-ride:
                condition: service_healthy
            postgres-pricing:
                condition: service_healthy
            postgres-payment:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            jaeger:
